<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events | ACM JIT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-slate-950 font-sans text-slate-100 antialiased">
  <div class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(circle_at_18%_12%,rgba(16,185,129,0.16),transparent_31%),radial-gradient(circle_at_82%_8%,rgba(34,211,238,0.14),transparent_28%),linear-gradient(180deg,#020617,#0f172a_52%,#020617)]"></div>
  <div id="global-navbar"></div>

  <main class="mx-auto max-w-7xl px-4 pb-20 pt-32 sm:px-6 lg:px-8">
    <header class="mb-12 max-w-4xl">
      <p class="text-sm font-black uppercase tracking-[0.3em] text-cyan-300">Events</p>
      <h1 class="mt-4 text-4xl font-black text-white sm:text-6xl">Workshops, competitions, and chapter moments.</h1>
      <p class="mt-5 text-lg leading-8 text-slate-300">Explore all our upcoming events, competitions, and workshops. Keep checking back as we add more exciting opportunities!</p>
    </header>

    <section class="grid gap-8 lg:grid-cols-[1.1fr_0.9fr]">
      <div>
        <div class="mb-5 flex items-center justify-between">
          <h2 class="text-2xl font-black text-white">Upcoming Dynamic Events</h2>
          <span class="rounded-full bg-emerald-400/10 px-3 py-1 text-xs font-black text-emerald-300">Live queue</span>
        </div>
        <div id="upcoming-events-list" class="space-y-5"></div>
      </div>

      <aside>
        <h2 class="mb-5 text-2xl font-black text-white">Past Glories</h2>
        <div class="rounded-3xl border border-white/10 bg-white/[0.06] p-6 backdrop-blur">
          <div id="past-events-list" class="space-y-6"></div>
        </div>
      </aside>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
