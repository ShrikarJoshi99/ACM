<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In | ACM JIT</title>
  <meta name="description" content="Sign in to the ACM JIT membership portal — access chapter updates, resources, and member-only opportunities.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./CSS/global.css">
  <link rel="stylesheet" href="./CSS/theme.css">
  <link rel="stylesheet" href="./CSS/stars.css">
  <link rel="stylesheet" href="./CSS/auth-ui.css">
  <link rel="icon" href="acm-favicon.svg" type="image/svg+xml">
  <script>
    if (localStorage.getItem("theme") === "light" || !localStorage.getItem("theme")) {
      document.documentElement.classList.add("light-theme");
    }
  </script>
</head>

<body>
  <script>
    if (localStorage.getItem("theme") === "light") {
      document.body.classList.add("light-theme");
    }
  </script>
  <div class="bg-overlay"></div>
  <div id="global-navbar"></div>

  <main class="auth-page">
    <section class="auth-shell" aria-labelledby="signin-title">
      <!-- Left panel — visual / quote -->
      <div class="auth-panel-left">
        <div class="auth-panel-left-bg"></div>
        <div class="auth-panel-left-content">
          <div class="auth-panel-quote">
            <blockquote>
              <p class="auth-typewriter-text" id="typewriter-text"></p>
            </blockquote>
          </div>
        </div>
      </div>

      <!-- Right panel — form -->
      <div class="auth-panel-right">
        <div class="auth-form-wrap">
          <h2 id="signin-title" class="auth-title">Welcome Back</h2>
          <p class="auth-desc">Sign in to access chapter updates, resources, and member-only opportunities.</p>

          <form id="login-form" class="auth-form" autocomplete="on">
            <div class="auth-field">
              <label for="login-email" class="auth-label">Email</label>
              <input id="login-email" name="identifier" type="email" placeholder="name@gmail.com" class="auth-input" autocomplete="email" required>
            </div>

            <div class="auth-field">
              <label for="login-password" class="auth-label">Password</label>
              <div class="auth-input-group">
                <input id="login-password" name="password" type="password" placeholder="Enter your password" class="auth-input auth-input--password" autocomplete="current-password" required>
                <button type="button" class="auth-toggle-password" aria-label="Show password" data-target="login-password">
                  <!-- Eye icon -->
                  <svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                  <!-- Eye-off icon -->
                  <svg class="icon-eye-off" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                  </svg>
                </button>
              </div>
            </div>

            <button type="submit" class="auth-btn-submit">Sign In</button>
          </form>

          <div class="auth-links">
            <div>New here? <a href="register.html">Sign Up</a></div>
            <div><a href="forgot-password.html" class="auth-forgot-link">Forgot Password?</a></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Popup (preserved from original) -->
  <div id="popup"
    style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px);animation:fadeIn 0.3s ease-out;"
    onkeydown="if(event.key==='Escape')document.getElementById('popup-btn').click()">
    <style>
      @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
      #popup-content { animation: slideIn 0.4s ease-out; }
      #popup-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(34,211,238,0.3); }
      #popup-btn:active { transform: translateY(0); }
    </style>
    <div id="popup-content"
      style="background:linear-gradient(135deg,rgba(2,6,23,0.95),rgba(15,23,42,0.95));border:1px solid rgba(103,232,249,0.2);border-radius:1rem;padding:2.5rem;max-width:450px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.1);">
      <h2 id="popup-title" style="font-size:1.5rem;font-weight:900;color:#f1f5f9;margin-bottom:0.75rem;"></h2>
      <p id="popup-message" style="font-size:0.95rem;color:#cbd5e1;line-height:1.6;margin-bottom:2rem;"></p>
      <button id="popup-btn" type="button"
        style="width:100%;border:none;background:linear-gradient(135deg,var(--cyan-400),#06b6d4);color:#020617;padding:0.75rem 1.5rem;border-radius:0.75rem;cursor:pointer;font-weight:900;font-size:0.95rem;transition:all 0.3s ease;box-shadow:0 10px 25px -5px rgba(34,211,238,0.2);">Close</button>
    </div>
  </div>

  <script src="main.js"></script>
  <script src="./JS/auth-ui.js"></script>
</body>

</html>
