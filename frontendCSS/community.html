<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Community Hub | ACM JIT</title>
  <meta name="description" content="ACM JIT Community Hub — resources, blogs, technical guides, and our interactive chapter journey timeline.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./CSS/global.css">
  <link rel="stylesheet" href="./CSS/theme.css">
  <link rel="stylesheet" href="./CSS/stars.css">
  <link rel="stylesheet" href="./CSS/radial-orbital-timeline.css">
  <link rel="icon" href="acm-favicon.svg" type="image/svg+xml">
  <script>
    if (localStorage.getItem("theme") === "light" || !localStorage.getItem("theme")) {
      document.documentElement.classList.add("light-theme");
    }
  </script>
</head>
<body>
  <script>
    if (localStorage.getItem("theme") === "light") {
      document.body.classList.add("light-theme");
    }
  </script>
  <div class="bg-overlay"></div>
  <div id="global-navbar"></div>

  <main class="main-content">
    <header class="page-header">
      <p class="label">Community Hub</p>
      <h1 class="page-title">Learn in public. Share with care.</h1>
      <p class="page-subtitle">Your central place for resources, blogs, and knowledge sharing. Click any node in the orbit below to explore what our community has to offer.</p>
    </header>

    <div class="orbital-timeline" id="orbital-timeline">
      <div class="orbital-orbit-area">
        <!-- Orbit ring -->
        <div class="orbital-ring"></div>

        <!-- Center nucleus -->
        <div class="orbital-nucleus">
          <div class="orbital-nucleus-ring"></div>
          <div class="orbital-nucleus-ring-2"></div>
          <div class="orbital-nucleus-inner"></div>
        </div>

        <!-- Nodes are injected by orbital-timeline.js -->
      </div>
    </div>
  </main>

  <script src="main.js"></script>
  <script src="./JS/orbital-timeline.js"></script>

  <script>
    // Scroll Reveal Animation
    const revealElements = document.querySelectorAll('.reveal');
    const revealObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
    revealElements.forEach(el => revealObserver.observe(el));
  </script>
</body>
</html>
