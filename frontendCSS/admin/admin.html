<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Panel | ACM JIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: #0d0d0d; color: #f1f5f9; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }

    :root {
      --cyan-300: #67e8f9; --cyan-400: #22d3ee;
      --violet-300: #c4b5fd; --emerald-300: #6ee7b7;
      --rose-200: #fecdd3; --rose-300: #fda4af;
      --slate-300: #cbd5e1; --slate-400: #94a3b8; --slate-500: #64748b;
      --max-w: 80rem; --px: 1rem; --nav-h: 74px;
    }
    @media (min-width: 640px)  { :root { --px: 1.5rem; } }
    @media (min-width: 1024px) { :root { --px: 2rem; } }

    .bg-overlay {
      pointer-events: none; position: fixed; inset: 0; z-index: -10;
      background:
        radial-gradient(ellipse 70% 45% at 18% 12%, rgba(255,255,255,0.04), transparent),
        radial-gradient(ellipse 55% 40% at 82% 8%,  rgba(255,255,255,0.03), transparent),
        linear-gradient(180deg, #0d0d0d, #111111 52%, #0a0a0a);
    }

    .main-content {
      max-width: var(--max-w); margin-inline: auto;
      padding: calc(var(--nav-h) + 3.5rem) var(--px) 5rem;
    }

    /* ── Page header ── */
    .page-header {
      display: flex; flex-direction: column; gap: 1.5rem;
      margin-bottom: 2.5rem;
    }
    @media (min-width: 1024px) {
      .page-header { flex-direction: row; align-items: flex-end; justify-content: space-between; }
    }
    .header-text { max-width: 48rem; }
    .label {
      font-size: 0.75rem; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.3em; color: var(--cyan-300);
    }
    .page-title {
      margin-top: 1rem; font-size: clamp(2.25rem, 5vw, 3.75rem);
      font-weight: 900; color: #fff; line-height: 1.1;
    }
    .page-subtitle {
      margin-top: 1.25rem; font-size: 1.125rem; line-height: 2; color: var(--slate-300);
    }
    .btn-view {
      display: block; border-radius: 0.75rem;
      background: var(--cyan-400); color: #020617;
      font-weight: 900; padding: 0.75rem 1.5rem;
      text-align: center; white-space: nowrap;
      box-shadow: 0 20px 25px -5px rgba(34,211,238,0.2);
      transition: transform 0.3s ease, background 0.3s ease;
    }
    .btn-view:hover { transform: translateY(-4px); background: #fff; }

    /* ── Two-column grid ── */
    .admin-grid {
      display: grid; gap: 2rem;
    }
    @media (min-width: 1024px) {
      .admin-grid { grid-template-columns: 0.95fr 1.05fr; }
    }

    /* ── Panel card ── */
    .panel {
      border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06); padding: 1.5rem;
      backdrop-filter: blur(12px);
    }
    .panel-title { font-size: 1.5rem; font-weight: 900; color: #fff; margin-bottom: 1.5rem; }

    /* ── Form ── */
    .form-fields { display: flex; flex-direction: column; gap: 1.25rem; }
    .form-label { display: block; font-size: 0.875rem; font-weight: 700; color: var(--slate-300); margin-bottom: 0.5rem; }
    .form-input, .form-select, .form-textarea {
      width: 100%; border-radius: 0.75rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(2,6,23,0.8); color: #fff;
      padding: 0.75rem 1rem; outline: none; font-size: 1rem;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      transition: border-color 0.3s ease;
      appearance: none; -webkit-appearance: none;
    }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--slate-500); }
    .form-input:focus, .form-select:focus  { border-color: var(--cyan-300); }
    .form-select.violet:focus { border-color: var(--violet-300); }
    .form-select.emerald:focus { border-color: var(--emerald-300); }
    .form-textarea { resize: none; }
    .form-textarea:focus { border-color: var(--cyan-300); }

    .btn-save {
      width: 100%; border-radius: 0.75rem;
      background: var(--cyan-400); color: #020617;
      font-weight: 900; padding: 1rem 1.5rem;
      border: none; cursor: pointer; font-size: 1rem;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      box-shadow: 0 20px 25px -5px rgba(34,211,238,0.2);
      transition: transform 0.3s ease, background 0.3s ease;
    }
    .btn-save:hover { transform: translateY(-4px); background: #fff; }

    /* ── Saved events panel ── */
    .panel-head {
      display: flex; flex-wrap: wrap; align-items: center;
      justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem;
    }
    .btn-reset {
      border-radius: 0.75rem; border: 1px solid rgba(253,164,175,0.3);
      background: rgba(244,63,94,0.1); color: var(--rose-200);
      font-weight: 900; padding: 0.5rem 1rem; font-size: 0.875rem;
      cursor: pointer; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      transition: border-color 0.3s ease, background 0.3s ease;
    }
    .btn-reset:hover { border-color: var(--rose-200); background: rgba(244,63,94,0.2); }

    #admin-events-list { display: flex; flex-direction: column; gap: 1rem; }

    /* Saved event items (injected by JS) */
    #admin-events-list article {
      border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(2,6,23,0.6); padding: 1.25rem;
    }
    #admin-events-list article > div {
      display: flex; flex-wrap: wrap; align-items: flex-start;
      justify-content: space-between; gap: 1rem;
    }
    #admin-events-list p:first-child {
      font-size: 0.75rem; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.2em; color: var(--cyan-300);
    }
    #admin-events-list h3 {
      margin-top: 0.5rem; font-size: 1.25rem; font-weight: 900; color: #fff;
    }
    #admin-events-list .event-meta {
      margin-top: 0.25rem; font-size: 0.875rem; color: var(--slate-400);
    }
    #admin-events-list .event-body {
      margin-top: 0.75rem; font-size: 0.875rem; line-height: 1.75; color: var(--slate-300);
    }

    /* Delete buttons injected by JS */
    [data-delete-event] {
      flex-shrink: 0; border-radius: 0.5rem;
      border: 1px solid rgba(253,164,175,0.3);
      background: rgba(244,63,94,0.1); color: var(--rose-200);
      font-weight: 900; padding: 0.5rem 0.75rem; font-size: 0.875rem;
      cursor: pointer; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      transition: background 0.3s ease;
    }
    [data-delete-event]:hover { background: rgba(244,63,94,0.2); }

    .hidden { display: none !important; }
  </style>
  <link rel="icon" href="acm-favicon.svg" type="image/svg+xml">
</head>
<body>
  <script>
    (function(){
      try {
        const user = localStorage.getItem('user');
        if (!user) { window.location.href = '../join-us.html'; return; }
        const u = JSON.parse(user);
        const isAdmin = !!(u && (u.isAdmin || (typeof u.role === 'string' && u.role.toLowerCase() === 'admin') || (Array.isArray(u.roles) && u.roles.map(r=>String(r).toLowerCase()).includes('admin'))));
        if (!isAdmin) { window.location.href = '../join-us.html'; }
      } catch (e) {
        window.location.href = '../join-us.html';
      }
    })();
  </script>
  <div class="bg-overlay"></div>
  <div id="global-navbar"></div>

  <main class="main-content">
    <header class="page-header">
      <div class="header-text">
        <p class="label">Admin Panel</p>
        <h1 class="page-title">Manage ACM JIT events.</h1>
        <p class="page-subtitle">Add upcoming events and past glories from here. This demo stores data in this browser using localStorage.</p>
      </div>
      <a href="../events.html" class="btn-view">View Events Page</a>
    </header>

    <div class="admin-grid">
      <!-- Add event form -->
      <form id="event-admin-form" class="panel">
        <h2 class="panel-title">Add Event</h2>
        <div class="form-fields">
          <label>
            <span class="form-label">Event Type</span>
            <select id="event-type" class="form-select">
              <option value="upcoming">Upcoming Dynamic Event</option>
              <option value="past">Past Glory</option>
            </select>
          </label>

          <label>
            <span class="form-label">Title</span>
            <input id="event-title" required type="text" placeholder="Frontend Craft Lab" class="form-input"/>
          </label>

          <label>
            <span class="form-label">Date / Label</span>
            <input id="event-date" required type="text" placeholder="August 2026" class="form-input"/>
          </label>

          <label id="event-status-wrap">
            <span class="form-label">Registration Status</span>
            <select id="event-status" class="form-select emerald">
              <option>Registration Open</option>
              <option>Opening Soon</option>
              <option>Seats Filling Fast</option>
              <option>Closed</option>
            </select>
          </label>

          <label>
            <span class="form-label">Description</span>
            <textarea id="event-description" required rows="5" placeholder="Write a short event description..." class="form-textarea"></textarea>
          </label>

          <button type="submit" class="btn-save">Save Event</button>
        </div>
      </form>

      <!-- Saved events list -->
      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title" style="margin-bottom:0;">Saved Events</h2>
          <button id="reset-events" type="button" class="btn-reset">Reset Demo Data</button>
        </div>
        <div id="admin-events-list"></div>
      </section>
    </div>
    <div class="admin-grid" style="margin-top: 3rem;">
      <!-- Add announcement form -->
      <form id="announcement-admin-form" class="panel">
        <h2 class="panel-title">Add Announcement</h2>
        <div class="form-fields">
          <label>
            <span class="form-label">Category / Badge</span>
            <select id="announcement-category" class="form-select cyan">
              <option value="cyan">Hackathon Alerts (Cyan)</option>
              <option value="violet">Core Update (Violet)</option>
              <option value="emerald">Workshop (Emerald)</option>
            </select>
          </label>

          <label>
            <span class="form-label">Title</span>
            <input id="announcement-title" required type="text" placeholder="Internal hack sprint registration opens soon" class="form-input"/>
          </label>

          <label>
            <span class="form-label">Time / Date string</span>
            <input id="announcement-time" required type="text" placeholder="Today, 10:30 AM" class="form-input"/>
          </label>

          <label>
            <span class="form-label">Body Text</span>
            <textarea id="announcement-body" required rows="4" placeholder="Teams can start preparing project ideas..." class="form-textarea"></textarea>
          </label>

          <button type="submit" class="btn-save" style="margin-top: 0.5rem;">Save Announcement</button>
        </div>
      </form>

      <!-- Saved announcements list -->
      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title" style="margin-bottom:0;">Saved Announcements</h2>
          <button id="reset-announcements" type="button" class="btn-reset">Reset Demo Data</button>
        </div>
        <div id="admin-announcements-list" style="display: flex; flex-direction: column; gap: 1rem;"></div>
      </section>
    </div>
  </main>

  <script src="../main.js"></script>
</body>
</html>
