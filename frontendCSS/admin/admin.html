<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | ACM JIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../CSS/global.css">
  <link rel="stylesheet" href="../CSS/theme.css">
  <link rel="icon" href="assets/Logo.png" type="image/png">
</head>

<body>
  <script>
    (function () {
      try {
        const user = localStorage.getItem('user');
        if (!user) { window.location.href = '../join-us.html'; return; }
        const u = JSON.parse(user);
        const isAdmin = !!(u && (u.isAdmin || (typeof u.role === 'string' && u.role.toLowerCase() === 'admin') || (Array.isArray(u.roles) && u.roles.map(r => String(r).toLowerCase()).includes('admin'))));
        if (!isAdmin) { window.location.href = '../join-us.html'; }
      } catch (e) {
        window.location.href = '../join-us.html';
      }
    })();
  </script>
  <div class="bg-overlay"></div>
  <div id="global-navbar"></div>

  <main class="main-content" style="padding-top: 1.5rem;">
    <header class="admin-page-header">
      <div class="header-text">
        <p class="label">Admin Panel</p>
        <h1 class="page-title">Manage ACM JIT events.</h1>
        <p class="page-subtitle">Add upcoming events and past glories from here. This demo stores data in this browser
          using localStorage.</p>
      </div>
      <a href="../events.html" class="btn-view">View Events Page</a>
    </header>

    <div class="admin-grid">
      <!-- Add event form -->
      <form id="event-admin-form" class="panel">
        <h2 class="panel-title">Add Event</h2>
        <div class="form-fields">
          <label>
            <span class="form-label">Event Type</span>
            <select id="event-type" class="form-select">
              <option value="upcoming">Upcoming Dynamic Event</option>
              <option value="past">Past Glory</option>
            </select>
          </label>

          <label>
            <span class="form-label">Title</span>
            <input id="event-title" required type="text" placeholder="Frontend Craft Lab" class="form-input" />
          </label>

          <label>
            <span class="form-label">Event Date</span>
            <input id="event-date" required type="date" class="form-input" />
          </label>

          <label id="event-reg-open-wrap">
            <span class="form-label">Registration Opens</span>
            <input id="event-reg-open" type="date" class="form-input" />
          </label>

          <label id="event-reg-close-wrap">
            <span class="form-label">Registration Closes</span>
            <input id="event-reg-close" type="date" class="form-input" />
          </label>

          <label id="event-team-size-wrap">
            <span class="form-label">Max Team Size</span>
            <input id="event-team-size" required type="number" min="1" max="10" value="1" class="form-input" />
          </label>

          <label>
            <span class="form-label">Description</span>
            <textarea id="event-description" required rows="5" placeholder="Write a short event description..."
              class="form-textarea"></textarea>
          </label>

          <button type="submit" class="btn-save">Save Event</button>
        </div>
      </form>

      <!-- Saved events list -->
      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title" style="margin-bottom:0;">Saved Events</h2>
          <button id="reset-events" type="button" class="btn-reset">Reset Data</button>
        </div>
        <div id="admin-events-list"></div>
      </section>
    </div>
    <div class="admin-grid" style="margin-top: 3rem;">
      <!-- Add announcement form -->
      <form id="announcement-admin-form" class="panel">
        <h2 class="panel-title">Add Announcement</h2>
        <div class="form-fields">
          <label>
            <span class="form-label">Category / Badge</span>
            <select id="announcement-category" class="form-select cyan">
              <option value="cyan">Hackathon Alerts (Cyan)</option>
              <option value="violet">Core Update (Violet)</option>
              <option value="emerald">Workshop (Emerald)</option>
            </select>
          </label>

          <label>
            <span class="form-label">Title</span>
            <input id="announcement-title" required type="text"
              placeholder="Internal hack sprint registration opens soon" class="form-input" />
          </label>

          <label>
            <span class="form-label">Time / Date string</span>
            <input id="announcement-time" required type="text" placeholder="Today, 10:30 AM" class="form-input" />
          </label>

          <label>
            <span class="form-label">Body Text</span>
            <textarea id="announcement-body" required rows="4" placeholder="Teams can start preparing project ideas..."
              class="form-textarea"></textarea>
          </label>

          <button type="submit" class="btn-save" style="margin-top: 0.5rem;">Save Announcement</button>
        </div>
      </form>

      <!-- Saved announcements list -->
      <section class="panel">
        <div class="panel-head">
          <h2 class="panel-title" style="margin-bottom:0;">Saved Announcements</h2>
          <button id="reset-announcements" type="button" class="btn-reset">Reset Data</button>
        </div>
        <div id="admin-announcements-list" style="display: flex; flex-direction: column; gap: 1rem;"></div>
      </section>
    </div>
  </main>

  <script src="../main.js"></script>
</body>

</html>
