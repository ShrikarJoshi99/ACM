<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Analytics | ACM JIT</title>
  <link rel="icon" href="acm-favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../global.css">
</head>
<body>
<script>
  (function(){
    try {
      const user = localStorage.getItem('user');
      if (!user) { window.location.href = '../join-us.html'; return; }
      const u = JSON.parse(user);
      const isAdmin = !!(u && (u.isAdmin || (typeof u.role === 'string' && u.role.toLowerCase() === 'admin') || (Array.isArray(u.roles) && u.roles.map(r=>String(r).toLowerCase()).includes('admin'))));
      if (!isAdmin) { window.location.href = '../join-us.html'; }
    } catch (e) { window.location.href = '../join-us.html'; }
  })();
</script>
<div class="main">
  <h1>Analytics</h1>
  <div class="panel">
    <p>This is a placeholder admin analytics page.</p>
    <p>Integrate charts, usage stats, and reports here.</p>
  </div>
</div>
</body>
</html>
