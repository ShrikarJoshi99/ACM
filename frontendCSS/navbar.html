<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cyan-200: #a5f3fc; --cyan-300: #67e8f9; --cyan-400: #22d3ee;
    --violet-200: #ddd6fe; --slate-300: #cbd5e1; --nav-h: 74px;
    --max-w: 80rem; --px: 1rem;
  }
  @media (min-width: 640px)  { :root { --px: 1.5rem; } }
  @media (min-width: 1024px) { :root { --px: 2rem; } }

  .nav {
    position: fixed; inset: 0 0 auto 0; z-index: 50;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    background: rgba(2,6,23,0.7);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 25px 50px -12px rgba(8,51,68,0.2);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    max-width: var(--max-w); margin-inline: auto; padding: 1rem var(--px);
  }
  .nav-logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: inherit; }
  .nav-logo-mark {
    display: grid; place-items: center;
    height: 2.5rem; width: 2.5rem; border-radius: 0.75rem;
    border: 1px solid rgba(34,211,238,0.3); background: rgba(34,211,238,0.1);
    font-size: 0.75rem; font-weight: 900; color: var(--cyan-300);
    box-shadow: 0 10px 15px -3px rgba(8,51,68,0.4);
    transition: border-color 0.3s ease, background 0.3s ease;
  }
  .nav-logo:hover .nav-logo-mark { border-color: rgba(103,232,249,0.7); background: rgba(34,211,238,0.2); }
  .nav-logo-text { font-size: 1.125rem; font-weight: 900; letter-spacing: 0.05em; color: #fff; }

  .nav-toggle {
    display: none; height: 2.5rem; width: 2.5rem;
    align-items: center; justify-content: center;
    border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05); color: #f1f5f9; cursor: pointer;
    transition: border-color 0.3s ease, color 0.3s ease;
  }
  .nav-toggle:hover { border-color: rgba(103,232,249,0.5); color: var(--cyan-300); }

  .nav-links {
    display: flex; align-items: center; gap: 0.25rem;
  }
  .nav-link {
    display: block; border-radius: 0.75rem; padding: 0.5rem 1rem;
    font-size: 0.875rem; font-weight: 600; color: var(--slate-300);
    text-decoration: none; transition: background 0.3s ease, color 0.3s ease;
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
  }
  .nav-link:hover { background: rgba(255,255,255,0.05); color: var(--cyan-300); }
  button.nav-link {
    appearance: none; -webkit-appearance: none; -moz-appearance: none;
    border: none; background: transparent; color: inherit;
    padding: 0.5rem 1rem;
    font: inherit; cursor: pointer;
  }
  .nav-link.active {
    color: var(--cyan-300); background: rgba(255,255,255,0.1);
    position: relative;
  }
  .nav-link.active::after {
    content: ''; display: block;
    height: 2px; width: 100%; margin-top: 2px;
    border-radius: 9999px; background: rgba(103,232,249,0.8);
  }
  .nav-cta {
    display: block; margin-left: 0.5rem; border-radius: 0.75rem;
    background: var(--cyan-400); padding: 0.625rem 1.25rem; text-align: center;
    font-size: 0.875rem; font-weight: 900; color: #020617; text-decoration: none;
    box-shadow: 0 10px 15px -3px rgba(34,211,238,0.2);
    transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
  }
  .nav-cta:hover { transform: translateY(-2px); background: #fff; box-shadow: 0 10px 15px -3px rgba(103,232,249,0.3); }
  .nav-cta.active { box-shadow: 0 0 0 2px rgba(165,243,252,0.5); }

  @media (max-width: 767px) {
    .nav-toggle { display: inline-flex; }
    .nav-links {
      display: none; flex-direction: column; align-items: stretch;
      position: absolute; left: 1rem; right: 1rem; top: var(--nav-h);
      border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(2,6,23,0.95); padding: 0.75rem;
      box-shadow: 0 25px 50px -12px rgba(8,51,68,0.3);
      backdrop-filter: blur(20px);
    }
    .nav-links.open { display: flex; }
    .nav-link { padding: 0.75rem 1rem; }
    .nav-cta { margin-left: 0; margin-top: 0.5rem; padding: 0.75rem 1.25rem; }
  }
</style>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo" aria-label="ACM JIT home">
      <span class="nav-logo-mark">ACM</span>
      <span class="nav-logo-text">ACM JIT</span>
    </a>

    <button id="nav-menu-button" class="nav-toggle" type="button" aria-label="Toggle navigation" aria-expanded="false">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <div id="nav-links" class="nav-links">
      <a class="nav-link" href="index.html"          data-page="index.html">Home</a>
      <a class="nav-link" href="announcements.html"  data-page="announcements.html">Announcements</a>
      <a class="nav-link" href="community.html"      data-page="community.html">Community Hub</a>
      <a class="nav-link" href="events.html"         data-page="events.html">Events</a>
      <a class="nav-link" href="know-us.html"        data-page="know-us.html">Know Us</a>
      <a class="nav-link nav-cta" href="join-us.html" data-page="join-us.html">Sign In</a>
    </div>
  </div>
</nav>
