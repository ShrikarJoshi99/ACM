<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password | ACM JIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
/* ===========================
   ACM JIT — Shared Design System
   =========================== */

/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
  background-color: #020617;
  color: #f1f5f9;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: inherit; }
input, textarea, select { font-family: inherit; }

/* ── CSS Variables ── */
:root {
  --cyan-200: #a5f3fc;
  --cyan-300: #67e8f9;
  --cyan-400: #22d3ee;
  --violet-200: #ddd6fe;
  --violet-300: #c4b5fd;
  --violet-400: #a78bfa;
  --emerald-200: #a7f3d0;
  --emerald-300: #6ee7b7;
  --emerald-400: #34d399;
  --amber-300: #fcd34d;
  --rose-200: #fecdd3;
  --rose-300: #fda4af;
  --fuchsia-300: #e879f9;
  --slate-300: #cbd5e1;
  --slate-400: #94a3b8;
  --slate-500: #64748b;
  --slate-950: #020617;

  --max-w: 80rem;
  --px: 1rem;
  --nav-h: 74px;
}

/* ── Background Overlay ── */
.bg-overlay {
  pointer-events: none;
  position: fixed;
  inset: 0;
  z-index: -10;
}

/* ── Layout ── */
.container {
  max-width: var(--max-w);
  margin-inline: auto;
  padding-inline: var(--px);
}
@media (min-width: 640px)  { :root { --px: 1.5rem; } }
@media (min-width: 1024px) { :root { --px: 2rem; } }

/* ── Typography ── */
.label {
  font-size: 0.75rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.3em;
  color: var(--cyan-300);
}

.page-title {
  font-size: clamp(2.25rem, 5vw, 3.75rem);
  font-weight: 900;
  color: #fff;
  line-height: 1.1;
  margin-top: 1rem;
}

.page-subtitle {
  font-size: 1.125rem;
  line-height: 2;
  color: var(--slate-300);
  margin-top: 1.25rem;
  max-width: 48rem;
}

/* ── Cards ── */
.card {
  border-radius: 1.5rem;
  border: 1px solid rgba(255,255,255,0.10);
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 1.5rem;
}

.card-xl {
  border-radius: 2rem;
}

/* ── Buttons ── */
.btn-primary {
  display: inline-block;
  border-radius: 0.75rem;
  background: var(--cyan-400);
  color: #020617;
  font-weight: 900;
  padding: 1rem 1.75rem;
  text-align: center;
  box-shadow: 0 20px 25px -5px rgba(34,211,238,0.2);
  transition: transform 0.3s ease, background 0.3s ease;
}
.btn-primary:hover { transform: translateY(-4px); background: #fff; }

.btn-ghost {
  display: inline-block;
  border-radius: 0.75rem;
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-weight: 900;
  padding: 1rem 1.75rem;
  text-align: center;
  backdrop-filter: blur(8px);
  transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease, color 0.3s ease;
}
.btn-ghost:hover {
  transform: translateY(-4px);
  border-color: rgba(196,181,253,0.6);
  background: rgba(167,139,250,0.1);
  color: var(--violet-200);
}

.btn-danger {
  display: inline-block;
  border-radius: 0.75rem;
  border: 1px solid rgba(253,164,175,0.3);
  background: rgba(244,63,94,0.1);
  color: var(--rose-200);
  font-weight: 900;
  padding: 0.5rem 1rem;
  font-size: 0.875rem;
  transition: background 0.3s ease, border-color 0.3s ease;
}
.btn-danger:hover { background: rgba(244,63,94,0.2); border-color: var(--rose-200); }

/* ── Badges ── */
.badge {
  display: inline-flex;
  border-radius: 9999px;
  padding: 0.25rem 0.75rem;
  font-size: 0.75rem;
  font-weight: 900;
}
.badge-cyan    { background: rgba(34,211,238,0.1);  color: var(--cyan-200);    }
.badge-violet  { background: rgba(139,92,246,0.1);  color: var(--violet-200);  }
.badge-emerald { background: rgba(52,211,153,0.1);  color: var(--emerald-200); }
.badge-amber   { background: rgba(251,191,36,0.1);  color: var(--amber-300);   }
.badge-rose    { background: rgba(244,63,94,0.1);   color: var(--rose-300);    }
.badge-active  { background: rgba(52,211,153,0.1);  color: var(--emerald-300); }

/* ── Form Elements ── */
.form-input,
.form-select,
.form-textarea {
  width: 100%;
  border-radius: 0.75rem;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(2,6,23,0.8);
  color: #fff;
  padding: 0.75rem 1rem;
  outline: none;
  transition: border-color 0.3s ease;
  appearance: none;
  -webkit-appearance: none;
}
.form-input::placeholder,
.form-textarea::placeholder { color: var(--slate-500); }
.form-input:focus,
.form-select:focus,
.form-textarea:focus { border-color: var(--cyan-300); }
.form-label {
  display: block;
  font-size: 0.875rem;
  font-weight: 700;
  color: var(--slate-300);
  margin-bottom: 0.5rem;
}
.form-textarea { resize: none; }

/* ── Nav ── */
.nav {
  position: fixed;
  inset: 0 0 auto 0;
  z-index: 50;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  background: rgba(2,6,23,0.7);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 25px 50px -12px rgba(8,51,68,0.2);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: var(--max-w);
  margin-inline: auto;
  padding: 1rem var(--px);
}
.nav-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}
.nav-logo-mark {
  display: grid;
  place-items: center;
  height: 2.5rem;
  width: 2.5rem;
  border-radius: 0.75rem;
  border: 1px solid rgba(34,211,238,0.3);
  background: rgba(34,211,238,0.1);
  font-size: 0.75rem;
  font-weight: 900;
  color: var(--cyan-300);
  box-shadow: 0 10px 15px -3px rgba(8,51,68,0.4);
  transition: border-color 0.3s ease, background 0.3s ease;
}
.nav-logo:hover .nav-logo-mark { border-color: rgba(103,232,249,0.7); background: rgba(34,211,238,0.2); }
.nav-logo-text { font-size: 1.125rem; font-weight: 900; letter-spacing: 0.05em; color: #fff; }

.nav-links {
  display: flex;
  align-items: center;
  gap: 0.25rem;
}
.nav-link {
  display: block;
  border-radius: 0.75rem;
  padding: 0.5rem 1rem;
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--slate-300);
  transition: background 0.3s ease, color 0.3s ease;
}
.nav-link:hover { background: rgba(255,255,255,0.05); color: var(--cyan-300); }
.nav-link.active { color: var(--cyan-300); background: rgba(255,255,255,0.1); }

.nav-cta {
  margin-left: 0.5rem;
  border-radius: 0.75rem;
  background: var(--cyan-400);
  padding: 0.625rem 1.25rem;
  font-size: 0.875rem;
  font-weight: 900;
  color: #020617;
  box-shadow: 0 10px 15px -3px rgba(34,211,238,0.2);
  transition: transform 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
}
.nav-cta:hover { transform: translateY(-2px); background: #fff; box-shadow: 0 10px 15px -3px rgba(103,232,249,0.3); }
.nav-cta.active { box-shadow: 0 0 0 2px rgba(165,243,252,0.5); }

.nav-toggle {
  display: none;
  height: 2.5rem;
  width: 2.5rem;
  align-items: center;
  justify-content: center;
  border-radius: 0.5rem;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #f1f5f9;
  transition: border-color 0.3s ease, color 0.3s ease;
}
.nav-toggle:hover { border-color: rgba(103,232,249,0.5); color: var(--cyan-300); }

@media (max-width: 767px) {
  .nav-toggle { display: inline-flex; }
  .nav-links {
    display: none;
    flex-direction: column;
    align-items: stretch;
    position: absolute;
    left: 1rem; right: 1rem;
    top: calc(var(--nav-h) - 2px);
    border-radius: 1rem;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(2,6,23,0.95);
    padding: 0.75rem;
    box-shadow: 0 25px 50px -12px rgba(8,51,68,0.3);
    backdrop-filter: blur(20px);
  }
  .nav-links.open { display: flex; }
  .nav-link { padding: 0.75rem 1rem; }
  .nav-cta { margin-left: 0; margin-top: 0.5rem; text-align: center; padding: 0.75rem 1.25rem; }
}

/* ── Hover Lift ── */
.hover-lift { transition: transform 0.3s ease; }
.hover-lift:hover { transform: translateY(-8px); }

.hover-lift-sm { transition: transform 0.3s ease; }
.hover-lift-sm:hover { transform: translateY(-4px); }

/* ── Section spacing ── */
.main-content {
  max-width: var(--max-w);
  margin-inline: auto;
  padding: calc(var(--nav-h) + 3.5rem) var(--px) 5rem;
}

.page-header { margin-bottom: 3rem; max-width: 56rem; }

  </style>
  <style>
    body { background: #020617; }
    .bg-overlay {
      background:
        radial-gradient(circle at 20% 20%, rgba(34,211,238,0.2), transparent 31%),
        radial-gradient(circle at 78% 22%, rgba(139,92,246,0.2), transparent 30%),
        radial-gradient(circle at 50% 86%, rgba(14,165,233,0.14), transparent 32%),
        linear-gradient(180deg, #020617, #0f172a 55%, #020617);
    }
    .auth-page {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 7rem 1rem 4rem;
    }
    .auth-card {
      width: 100%;
      max-width: 44rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 25px 50px -12px rgba(8,51,68,0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 1.5rem;
    }
    @media (min-width: 640px) { .auth-card { padding: 2.5rem; } }
    .auth-kicker {
      font-size: 0.75rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: var(--cyan-300);
    }
    .auth-title {
      margin-top: 0.75rem;
      font-size: clamp(2rem, 4vw, 2.75rem);
      font-weight: 900;
      line-height: 1.12;
      color: #fff;
    }
    .auth-desc {
      margin-top: 0.9rem;
      max-width: 36rem;
      line-height: 1.8;
      color: var(--slate-300);
    }
    .auth-form { margin-top: 2rem; display: flex; flex-direction: column; gap: 1.25rem; }
    .form-input {
      background: rgba(2,6,23,0.7);
      padding: 1rem;
      transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
    }
    .form-input:focus {
      background: #020617;
      border-color: var(--cyan-300);
      box-shadow: 0 10px 15px -3px rgba(8,51,68,0.4);
    }
    .form-input.violet:focus {
      border-color: var(--violet-300);
      box-shadow: 0 10px 15px -3px rgba(30,20,68,0.4);
    }
    .btn-submit {
      width: 100%;
      border-radius: 0.75rem;
      background: var(--cyan-400);
      color: #020617;
      font-weight: 900;
      padding: 1rem 1.5rem;
      border: none;
      font-size: 1rem;
      box-shadow: 0 20px 25px -5px rgba(34,211,238,0.2);
      transition: transform 0.3s ease, background 0.3s ease;
    }
    .btn-submit:hover { transform: translateY(-4px); background: #fff; }
    .auth-links {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.875rem;
      color: var(--slate-400);
    }
    .auth-links a { color: var(--cyan-200); font-weight: 800; transition: color 0.3s ease; }
    .auth-links a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>
  <div id="global-navbar"></div>

  <main class="auth-page">
    <section class="auth-card" aria-labelledby="forgot-title">
      <p class="auth-kicker">Password Recovery</p>
      <h1 id="forgot-title" class="auth-title">Reset your portal password.</h1>
      <p class="auth-desc">Use your reset token and choose a new password to restore access to your ACM JIT student account.</p>

      <form id="forgot-password-form" class="auth-form">
        <label>
          <span class="form-label">Reset Token</span>
          <input name="resetToken" type="text" placeholder="Enter reset token" class="form-input" autocomplete="one-time-code" required>
        </label>
        <label>
          <span class="form-label">New Password</span>
          <input name="newPassword" type="password" placeholder="Enter new password" class="form-input violet" autocomplete="new-password" required>
        </label>
        <button type="submit" class="btn-submit">Reset Password</button>
      </form>

      <p class="auth-links"><a href="join-us.html">Back to Sign In</a></p>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
