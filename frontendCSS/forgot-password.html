<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password | ACM JIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #020617; }
    .bg-overlay {
      background:
        radial-gradient(circle at 20% 20%, rgba(34,211,238,0.2), transparent 31%),
        radial-gradient(circle at 78% 22%, rgba(139,92,246,0.2), transparent 30%),
        radial-gradient(circle at 50% 86%, rgba(14,165,233,0.14), transparent 32%),
        linear-gradient(180deg, #020617, #0f172a 55%, #020617);
    }
    .auth-page {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 7rem 1rem 4rem;
    }
    .auth-card {
      width: 100%;
      max-width: 44rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 25px 50px -12px rgba(8,51,68,0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 1.5rem;
    }
    @media (min-width: 640px) { .auth-card { padding: 2.5rem; } }
    .auth-kicker {
      font-size: 0.75rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: var(--cyan-300);
    }
    .auth-title {
      margin-top: 0.75rem;
      font-size: clamp(2rem, 4vw, 2.75rem);
      font-weight: 900;
      line-height: 1.12;
      color: #fff;
    }
    .auth-desc {
      margin-top: 0.9rem;
      max-width: 36rem;
      line-height: 1.8;
      color: var(--slate-300);
    }
    .auth-form { margin-top: 2rem; display: flex; flex-direction: column; gap: 1.25rem; }
    .form-input {
      background: rgba(2,6,23,0.7);
      padding: 1rem;
      transition: border-color 0.3s ease, background 0.3s ease, box-shadow 0.3s ease;
    }
    .form-input:focus {
      background: #020617;
      border-color: var(--cyan-300);
      box-shadow: 0 10px 15px -3px rgba(8,51,68,0.4);
    }
    .form-input.violet:focus {
      border-color: var(--violet-300);
      box-shadow: 0 10px 15px -3px rgba(30,20,68,0.4);
    }
    .btn-submit {
      width: 100%;
      border-radius: 0.75rem;
      background: var(--cyan-400);
      color: #020617;
      font-weight: 900;
      padding: 1rem 1.5rem;
      border: none;
      font-size: 1rem;
      box-shadow: 0 20px 25px -5px rgba(34,211,238,0.2);
      transition: transform 0.3s ease, background 0.3s ease;
    }
    .btn-submit:hover { transform: translateY(-4px); background: #fff; }
    .auth-links {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.875rem;
      color: var(--slate-400);
    }
    .auth-links a { color: var(--cyan-200); font-weight: 800; transition: color 0.3s ease; }
    .auth-links a:hover { color: #fff; }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>
  <div id="global-navbar"></div>

  <main class="auth-page">
    <section class="auth-card" aria-labelledby="forgot-title">
      <p class="auth-kicker">Password Recovery</p>
      <h1 id="forgot-title" class="auth-title">Reset your portal password.</h1>
      <p class="auth-desc">Use your reset token and choose a new password to restore access to your ACM JIT student account.</p>

      <form id="forgot-password-form" class="auth-form">
        <label>
          <span class="form-label">Reset Token</span>
          <input name="resetToken" type="text" placeholder="Enter reset token" class="form-input" autocomplete="one-time-code" required>
        </label>
        <label>
          <span class="form-label">New Password</span>
          <input name="newPassword" type="password" placeholder="Enter new password" class="form-input violet" autocomplete="new-password" required>
        </label>
        <button type="submit" class="btn-submit">Reset Password</button>
      </form>

      <p class="auth-links"><a href="join-us.html">Back to Sign In</a></p>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
