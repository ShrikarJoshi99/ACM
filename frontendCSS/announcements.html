<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Announcements | ACM JIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./CSS/global.css">
  <link rel="stylesheet" href="./CSS/theme.css">
  <link rel="stylesheet" href="./CSS/stars.css">
  <link rel="icon" href="acm-favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="bg-overlay"></div>
  <div id="global-navbar"></div>

  <main class="main-content">
    <header class="page-header" style="border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 2rem; margin-bottom: 2rem;">
      <p class="label">Bulletin</p>
      <h1 class="page-title">Announcements</h1>
      <p class="page-subtitle">Stay updated with the latest news, sprints, and core updates from our ACM chapter.</p>
    </header>

    <div class="events-grid">
      <div>
        <div class="section-head" style="margin-bottom: 1.5rem;">
          <h2 class="section-title">Live Feed</h2>
          <span class="badge-live">Updating</span>
        </div>
        <div class="announcements-grid reveal" id="announcements-list">
          <!-- Announcements will be injected here by JS -->
        </div>
      </div>

      <aside>
        <h2 class="section-title" style="margin-bottom: 1.25rem;">Categories</h2>
        <div class="past-wrap" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
          <div style="display:flex; align-items:center; gap:0.75rem;">
            <span style="display:block; width:12px; height:12px; border-radius:50%; background:var(--cyan-400);"></span>
            <span style="color:#cbd5e1; font-weight:600;">Hackathons &amp; Sprints</span>
          </div>
          <div style="display:flex; align-items:center; gap:0.75rem;">
            <span style="display:block; width:12px; height:12px; border-radius:50%; background:var(--violet-400);"></span>
            <span style="color:#cbd5e1; font-weight:600;">Core Updates</span>
          </div>
          <div style="display:flex; align-items:center; gap:0.75rem;">
            <span style="display:block; width:12px; height:12px; border-radius:50%; background:var(--emerald-400);"></span>
            <span style="color:#cbd5e1; font-weight:600;">Workshops &amp; Labs</span>
          </div>
          <div style="display:flex; align-items:center; gap:0.75rem;">
            <span style="display:block; width:12px; height:12px; border-radius:50%; background:var(--rose-400);"></span>
            <span style="color:#cbd5e1; font-weight:600;">Urgent Alerts</span>
          </div>
        </div>

        <h2 class="section-title" style="margin-top: 2.5rem; margin-bottom: 1.25rem;">Activity Stats</h2>
        <div class="past-wrap" style="padding: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
          <div style="text-align:center;">
            <div style="font-size:2rem; font-weight:900; color:var(--cyan-300);">24</div>
            <div style="font-size:0.75rem; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; font-weight:700;">This Month</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:2rem; font-weight:900; color:var(--violet-300);">156</div>
            <div style="font-size:0.75rem; color:#94a3b8; text-transform:uppercase; letter-spacing:1px; font-weight:700;">Total Posts</div>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
