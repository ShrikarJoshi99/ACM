<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Announcements | ACM JIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }
    body {
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: #0d0d0d; color: #f1f5f9; min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }

    :root {
      --cyan-200: #a5f3fc; --cyan-300: #67e8f9;
      --violet-200: #ddd6fe; --violet-300: #c4b5fd;
      --emerald-200: #a7f3d0; --emerald-300: #6ee7b7;
      --slate-300: #cbd5e1; --slate-400: #94a3b8;
      --max-w: 64rem; --px: 1rem; --nav-h: 74px;
    }
    @media (min-width: 640px)  { :root { --px: 1.5rem; } }
    @media (min-width: 1024px) { :root { --px: 2rem; } }

    .bg-overlay {
      pointer-events: none; position: fixed; inset: 0; z-index: -10;
      background:
        radial-gradient(ellipse 65% 45% at 15% 15%, rgba(255,255,255,0.04), transparent),
        radial-gradient(ellipse 50% 35% at 90% 5%,  rgba(255,255,255,0.03), transparent),
        linear-gradient(180deg, #0d0d0d, #111111 55%, #0a0a0a);
    }

    .main-content {
      max-width: var(--max-w); margin-inline: auto;
      padding: calc(var(--nav-h) + 3.5rem) var(--px) 5rem;
    }

    /* ── Header ── */
    .page-header { margin-bottom: 3.5rem; }
    .label {
      font-size: 0.75rem; font-weight: 900; text-transform: uppercase;
      letter-spacing: 0.3em; color: var(--cyan-300);
    }
    .page-title {
      margin-top: 1rem; font-size: clamp(2.25rem, 5vw, 3.75rem);
      font-weight: 900; color: #fff; line-height: 1.1;
    }
    .page-subtitle {
      margin-top: 1.25rem; font-size: 1.125rem; line-height: 2;
      color: var(--slate-300); max-width: 48rem;
    }

    /* ── Timeline ── */
    .timeline {
      position: relative;
      display: flex; flex-direction: column; gap: 1.5rem;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 1rem; top: 0.5rem; bottom: 0; width: 1px;
      background: linear-gradient(to bottom, var(--cyan-300), var(--violet-300), transparent);
    }
    @media (min-width: 640px) {
      .timeline::before { left: 1.5rem; }
    }

    .timeline-item {
      position: relative;
      margin-left: 2.5rem;
      border-radius: 1rem; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.06); padding: 1.5rem;
      box-shadow: 0 25px 50px -12px rgba(2,6,23,0.3);
      backdrop-filter: blur(12px);
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    @media (min-width: 640px) { .timeline-item { margin-left: 4rem; } }

    .timeline-item:hover { transform: translateY(-4px); }
    .timeline-item.cyan:hover   { border-color: rgba(103,232,249,0.5); }
    .timeline-item.violet:hover { border-color: rgba(196,181,253,0.5); }
    .timeline-item.emerald:hover{ border-color: rgba(110,231,183,0.5); }

    .timeline-dot {
      position: absolute;
      left: -2.85rem; top: 1.75rem;
      height: 1rem; width: 1rem; border-radius: 9999px;
    }
    @media (min-width: 640px) { .timeline-dot { left: -3.15rem; } }

    .timeline-dot.cyan   { background: var(--cyan-300);   box-shadow: 0 0 12px rgba(103,232,249,0.5); }
    .timeline-dot.violet { background: var(--violet-300); box-shadow: 0 0 12px rgba(196,181,253,0.5); }
    .timeline-dot.emerald{ background: var(--emerald-300);box-shadow: 0 0 12px rgba(110,231,183,0.5); }

    .item-meta { display: flex; flex-wrap: wrap; align-items: center; gap: 0.75rem; }
    .item-badge {
      border-radius: 9999px; padding: 0.25rem 0.75rem;
      font-size: 0.75rem; font-weight: 900;
    }
    .item-badge.cyan   { background: rgba(34,211,238,0.1);  color: var(--cyan-200); }
    .item-badge.violet { background: rgba(139,92,246,0.1);  color: var(--violet-200); }
    .item-badge.emerald{ background: rgba(52,211,153,0.1);  color: var(--emerald-200); }

    .item-time { font-size: 0.75rem; font-weight: 600; color: var(--slate-400); }
    .item-title { margin-top: 1rem; font-size: 1.5rem; font-weight: 900; color: #fff; }
    .item-body { margin-top: 0.75rem; line-height: 1.75; color: var(--slate-300); }
  </style>
  <link rel="icon" href="acm-favicon.svg" type="image/svg+xml">
</head>
<body>
  <div class="bg-overlay"></div>
  <div id="global-navbar"></div>

  <main class="main-content">
    <header class="page-header">
      <p class="label">Bulletin</p>
      <h1 class="page-title">Announcements</h1>
      <p class="page-subtitle">Stay updated with the latest news and announcements from our ACM chapter.</p>
    </header>

    <div class="timeline" id="announcements-list">
      <!-- Announcements will be injected here by JS -->
    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
